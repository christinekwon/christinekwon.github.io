<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Drag n Drop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" media="screen" href="main.css" />
  <link href="https://fonts.googleapis.com/css?family=Titillium+Web" rel="stylesheet">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.0.10/css/all.css" integrity="sha384-+d0P83n9kaQMCwj8F4RJB66tzIwOKmrdb46+porD/OvrJ+37WqIM7UoBtwHO6Nlg"
    crossorigin="anonymous">
  <link rel="stylesheet" href="http://code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css">
  <script src="main.js"></script>
</head>

<body>
  <div class="container">
    <div class="droppable">
      <div id='list' class="list" draggable="true" ondragstart="dragStart(event)">
        <img id='list' class="list" draggable="true" ondragstart="dragStart(event)" src="resources/images/computer.png" draggable="true" class="computer">
      </div>
    </div>
    <div class="droppable" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
    <div class="droppable" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
    <div class="droppable" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
    <div class="droppable" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
    <div class="droppable" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
    <div class="droppable" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
    <div class="droppable" ondragover="allowDrop(event)" ondrop="drop(event)"></div>
  </div>
</body>

</html>
